name: Playwright UI Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'demo-realworld-show/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'demo-realworld-show/**'
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    - name: Verify Java and Maven version
      run: |
        java --version
        mvn --version

    - name: Download Maven dependencies
      working-directory: demo-realworld-show
      run: mvn -B dependency:resolve

    - name: Install Playwright Browsers
      working-directory: demo-realworld-show
      run: mvn exec:java -Dexec.mainClass="com.microsoft.playwright.CLI" -Dexec.args="install --with-deps"

    - name: Run Playwright Tests
      working-directory: demo-realworld-show
      run: |
        mvn clean
        mvn test -DHEADLESS=true
        
    - name: Generate Allure Report
      if: always()
      run: |
        mkdir -p allure-results
        sudo wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
        sudo tar -zxvf allure-2.29.0.tgz -C /opt/
        sudo ln -s /opt/allure-2.29.0/bin/allure /usr/bin/allure
        allure generate target/allure-results -o target/site/allure-maven-plugin

    - name: Publish Allure Report
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: target/site/allure-maven-plugin
        publish_branch: gh-pages